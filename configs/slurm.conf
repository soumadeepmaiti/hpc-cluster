# /etc/slurm/slurm.conf
# 6-node HPC cluster — TUM Student Assistant Project
# Master: 192.168.50.1   Compute: 192.168.50.11–15

ClusterName=tum-hpc
SlurmctldHost=master

# Authentication
AuthType=auth/munge
CryptoType=crypto/munge
SlurmUser=slurm

# Ports
SlurmctldPort=6817
SlurmdPort=6818

# Paths
StateSaveLocation=/var/spool/slurmctld
SlurmdSpoolDir=/var/spool/slurmd
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log

# Scheduling
SwitchType=switch/none
MpiDefault=pmix
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_Core

# Process tracking + cgroups
ProctrackType=proctrack/cgroup
TaskPlugin=task/cgroup

# Timeouts and behaviour
ReturnToService=2
SlurmctldTimeout=120
SlurmdTimeout=300

# ---------------------------------------------------------------
# Node definitions  (update CPUs/RealMemory after: sudo slurmd -C)
# ---------------------------------------------------------------
NodeName=compute01 CPUs=8 Sockets=1 CoresPerSocket=4 ThreadsPerCore=2 RealMemory=15000 State=UNKNOWN
NodeName=compute02 CPUs=8 Sockets=1 CoresPerSocket=4 ThreadsPerCore=2 RealMemory=15000 State=UNKNOWN
NodeName=compute03 CPUs=8 Sockets=1 CoresPerSocket=4 ThreadsPerCore=2 RealMemory=15000 State=UNKNOWN
NodeName=compute04 CPUs=8 Sockets=1 CoresPerSocket=4 ThreadsPerCore=2 RealMemory=15000 State=UNKNOWN
NodeName=compute05 CPUs=8 Sockets=1 CoresPerSocket=4 ThreadsPerCore=2 RealMemory=15000 State=UNKNOWN

# ---------------------------------------------------------------
# Partitions
# ---------------------------------------------------------------
PartitionName=compute Nodes=compute[01-05] Default=YES MaxTime=24:00:00 State=UP
PartitionName=debug   Nodes=compute[01-02] Default=NO  MaxTime=00:30:00 State=UP Priority=100
