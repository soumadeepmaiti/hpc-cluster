# /etc/chrony/chrony.conf  — COMPUTE NODES
# Compute nodes sync exclusively from master.
# All public pool lines are intentionally commented out to enforce
# strict NTP hierarchy and prevent clock drift between nodes.

# Cluster master as sole NTP source
server 192.168.50.1 iburst

# Public pools DISABLED — compute nodes must not use external NTP
# pool ntp.ubuntu.com        iburst maxsources 4
# pool 0.ubuntu.pool.ntp.org iburst maxsources 1
# pool 1.ubuntu.pool.ntp.org iburst maxsources 1
# pool 2.ubuntu.pool.ntp.org iburst maxsources 2

sourcedir /run/chrony-dhcp
sourcedir /etc/chrony/sources.d

keyfile /etc/chrony/chrony.keys
driftfile /var/lib/chrony/chrony.drift
ntsdumpdir /var/lib/chrony
logdir /var/log/chrony

maxupdateskew 100.0
rtcsync
makestep 1 3
leapsectz right/UTC
